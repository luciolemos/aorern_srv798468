<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1800" viewBox="0 0 1400 1800" role="img" aria-labelledby="title desc">
  <title id="title">Manual de Identidade Visual da AORE/RN</title>
  <desc id="desc">Guia visual institucional com paleta, diretrizes de uso e especificacoes tecnicas da marca da AORE/RN.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1b2f4a"/>
      <stop offset="52%" stop-color="#294f37"/>
      <stop offset="100%" stop-color="#13283f"/>
    </linearGradient>
    <linearGradient id="panelGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="100%" stop-color="rgba(247,250,244,0.9)"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d9b54a"/>
      <stop offset="100%" stop-color="#f3e19a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <pattern id="microGrid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M16 0H0V16" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1400" height="1800" fill="url(#bg)"/>
  <rect width="1400" height="1800" fill="url(#microGrid)"/>

  <rect x="64" y="64" width="1272" height="1672" rx="30" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.16)" stroke-width="2"/>
  <rect x="96" y="96" width="1208" height="1608" rx="24" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.75"/>

  <g transform="translate(700 240)">
    <circle r="124" fill="none" stroke="url(#accent)" stroke-width="10"/>
    <circle r="102" fill="none" stroke="rgba(255,255,255,0.82)" stroke-width="2"/>
    <circle r="80" fill="#173551"/>
    <text x="0" y="-8" fill="#f3e19a" font-size="23" font-family="Georgia, 'Times New Roman', serif" text-anchor="middle" letter-spacing="2.4">AORE/RN</text>
    <text x="0" y="26" fill="#ffffff" font-size="12" font-family="Arial, sans-serif" text-anchor="middle" letter-spacing="1.8">RIO GRANDE DO NORTE</text>
  </g>

  <text x="700" y="432" fill="#f8fbf4" font-size="26" font-family="Arial, sans-serif" text-anchor="middle" letter-spacing="4">ASSOCIACAO DOS OFICIAIS DA RESERVA DO EXERCITO</text>
  <text x="700" y="510" fill="#ffffff" font-size="78" font-family="Georgia, 'Times New Roman', serif" text-anchor="middle" font-weight="700">Manual de Identidade Visual</text>
  <text x="700" y="562" fill="#dbe9c8" font-size="24" font-family="Arial, sans-serif" text-anchor="middle">Padroes oficiais para marca, aplicacao digital e documentos institucionais</text>

  <g transform="translate(144 628)" filter="url(#softShadow)">
    <rect width="1112" height="184" rx="20" fill="url(#panelGlass)"/>
    <rect x="0" y="0" width="14" height="184" rx="7" fill="#cc2229"/>
    <text x="42" y="52" fill="#10253f" font-size="28" font-family="Arial, sans-serif" font-weight="700">Escopo do documento</text>
    <text x="42" y="92" fill="#334a62" font-size="21" font-family="Arial, sans-serif">1. Versoes oficiais da marca e arquivos mestres para web e impressao.</text>
    <text x="42" y="126" fill="#334a62" font-size="21" font-family="Arial, sans-serif">2. Paleta institucional, hierarquia tipografica e orientacoes de contraste.</text>
    <text x="42" y="160" fill="#334a62" font-size="21" font-family="Arial, sans-serif">3. Regras de aplicacao, area de respiro e usos nao permitidos.</text>
  </g>

  <g transform="translate(144 850)">
    <rect width="530" height="464" rx="20" fill="rgba(15,33,51,0.82)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
    <text x="34" y="50" fill="#f3e19a" font-size="25" font-family="Arial, sans-serif" font-weight="700">Paleta institucional</text>

    <g transform="translate(34 82)">
      <rect width="74" height="74" rx="12" fill="#556b2f"/>
      <text x="90" y="28" fill="#ffffff" font-size="20" font-family="Arial, sans-serif" font-weight="700">Verde institucional</text>
      <text x="90" y="56" fill="#cfe0bc" font-size="18" font-family="Arial, sans-serif">#556B2F</text>
    </g>
    <g transform="translate(34 166)">
      <rect width="74" height="74" rx="12" fill="#10253f"/>
      <text x="90" y="28" fill="#ffffff" font-size="20" font-family="Arial, sans-serif" font-weight="700">Azul institucional</text>
      <text x="90" y="56" fill="#c5d9ee" font-size="18" font-family="Arial, sans-serif">#10253F</text>
    </g>
    <g transform="translate(34 250)">
      <rect width="74" height="74" rx="12" fill="#cc2229"/>
      <text x="90" y="28" fill="#ffffff" font-size="20" font-family="Arial, sans-serif" font-weight="700">Vermelho cerimonial</text>
      <text x="90" y="56" fill="#ffd4d7" font-size="18" font-family="Arial, sans-serif">#CC2229</text>
    </g>
    <g transform="translate(34 334)">
      <rect width="74" height="74" rx="12" fill="#d9b54a"/>
      <text x="90" y="28" fill="#ffffff" font-size="20" font-family="Arial, sans-serif" font-weight="700">Dourado honorifico</text>
      <text x="90" y="56" fill="#fff3c9" font-size="18" font-family="Arial, sans-serif">#D9B54A</text>
    </g>
  </g>

  <g transform="translate(726 850)">
    <rect width="530" height="464" rx="20" fill="rgba(255,255,255,0.95)"/>
    <text x="34" y="50" fill="#10253f" font-size="25" font-family="Arial, sans-serif" font-weight="700">Diretrizes de aplicacao</text>
    <text x="34" y="100" fill="#334a62" font-size="21" font-family="Arial, sans-serif">• Priorizar arquivos vetoriais (SVG) em interfaces web.</text>
    <text x="34" y="138" fill="#334a62" font-size="21" font-family="Arial, sans-serif">• Preservar proporcoes e elementos originais da marca.</text>
    <text x="34" y="176" fill="#334a62" font-size="21" font-family="Arial, sans-serif">• Garantir contraste minimo em fundos fotograficos.</text>
    <text x="34" y="214" fill="#334a62" font-size="21" font-family="Arial, sans-serif">• Evitar sombra pesada, contorno artificial e distorcao.</text>
    <text x="34" y="252" fill="#334a62" font-size="21" font-family="Arial, sans-serif">• Usar area de respiro proporcional ao diametro do selo.</text>
    <text x="34" y="290" fill="#334a62" font-size="21" font-family="Arial, sans-serif">• Validar novas pecas com a comunicacao institucional.</text>

    <rect x="34" y="330" width="462" height="102" rx="14" fill="#edf4e5" stroke="#d5e3c2" stroke-width="1.5"/>
    <text x="52" y="366" fill="#26412f" font-size="20" font-family="Arial, sans-serif" font-weight="700">Entrega recomendada</text>
    <text x="52" y="395" fill="#35556c" font-size="18" font-family="Arial, sans-serif">SVG (digital), PNG 3200px (midia), PDF vetorial (impressao)</text>
  </g>

  <g transform="translate(144 1356)">
    <rect width="1112" height="250" rx="20" fill="rgba(255,255,255,0.95)"/>
    <text x="34" y="48" fill="#10253f" font-size="25" font-family="Arial, sans-serif" font-weight="700">Padroes tecnicos minimos</text>

    <rect x="34" y="74" width="332" height="146" rx="14" fill="#f4f8ef" stroke="#d5e3c2" stroke-width="1.5"/>
    <text x="56" y="106" fill="#35556c" font-size="19" font-family="Arial, sans-serif" font-weight="700">Area de respiro</text>
    <circle cx="122" cy="164" r="36" fill="#173551"/>
    <rect x="70" y="112" width="104" height="104" fill="none" stroke="#7ca164" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="188" y="160" fill="#3c556e" font-size="17" font-family="Arial, sans-serif">Minimo 1x ao redor</text>
    <text x="188" y="186" fill="#3c556e" font-size="17" font-family="Arial, sans-serif">do diametro do selo</text>

    <rect x="390" y="74" width="332" height="146" rx="14" fill="#f4f8ef" stroke="#d5e3c2" stroke-width="1.5"/>
    <text x="412" y="106" fill="#35556c" font-size="19" font-family="Arial, sans-serif" font-weight="700">Tamanho minimo</text>
    <circle cx="460" cy="168" r="22" fill="#173551"/>
    <circle cx="546" cy="168" r="34" fill="#173551"/>
    <text x="590" y="160" fill="#3c556e" font-size="17" font-family="Arial, sans-serif">Digital: 48px</text>
    <text x="590" y="186" fill="#3c556e" font-size="17" font-family="Arial, sans-serif">Impresso: 18mm</text>

    <rect x="746" y="74" width="332" height="146" rx="14" fill="#fdf3f3" stroke="#f0c0c2" stroke-width="1.5"/>
    <text x="768" y="106" fill="#7b2834" font-size="19" font-family="Arial, sans-serif" font-weight="700">Nao permitido</text>
    <text x="768" y="142" fill="#8a3a46" font-size="17" font-family="Arial, sans-serif">• Esticar horizontalmente ou verticalmente</text>
    <text x="768" y="168" fill="#8a3a46" font-size="17" font-family="Arial, sans-serif">• Trocar cores institucionais da marca</text>
    <text x="768" y="194" fill="#8a3a46" font-size="17" font-family="Arial, sans-serif">• Aplicar sobre fundo sem contraste</text>
  </g>

  <g transform="translate(144 1640)">
    <rect width="1112" height="64" rx="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
    <text x="26" y="41" fill="#f4f8ef" font-size="21" font-family="Arial, sans-serif" font-weight="700">AORE/RN  |  Manual de identidade visual  |  Versao institucional 2026</text>
  </g>
</svg>
